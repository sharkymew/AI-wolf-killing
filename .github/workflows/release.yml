name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "frontend/src/**"
      - "frontend/package*.json"
      - "frontend/vite.config.*"
      - "frontend/index.html"
      - "config/**"
      - "requirements.txt"
      - "main.py"
      - "ai-werewolf.spec"
      - "VERSION"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true

  build:
    needs: create-release
    if: ${{ always() && !cancelled() }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: AI-Werewolf-linux
            binary: AI-Werewolf
          - os: macos-latest
            artifact: AI-Werewolf-macos
            binary: AI-Werewolf
          - os: windows-latest
            artifact: AI-Werewolf-windows
            binary: AI-Werewolf.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npx vite build
          cd ..

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm ai-werewolf.spec

      - name: Rename binary
        shell: bash
        run: |
          if [ -f "dist/${{ matrix.binary }}" ]; then
            cp "dist/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/${{ matrix.artifact }} --clobber
